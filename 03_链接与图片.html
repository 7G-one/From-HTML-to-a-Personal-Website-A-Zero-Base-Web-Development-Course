<!DOCTYPE html>
<!-- ============================================= -->
<!-- 第 03 课：链接与图片 -->
<!-- ============================================= -->
<!-- 上节课我们学习了文本标签。这节课我们学习链接和图片。 -->

<!-- ============================================= -->
<!-- 生活类比 -->
<!-- ============================================= -->
<!-- 超链接就像传送门，点击就跳到另一个世界。 -->
<!-- href 就是传送门的目的地，target="_blank" 就是开一扇新门（新窗口）。 -->
<!-- 图片标签 img 就像在墙上挂一幅画，src 是画的内容，alt 是画的标签说明。 -->
<!-- 锚点链接就像电梯，点击楼层按钮就跳到那一层。 -->

<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>链接与图片</title>
</head>
<body>

<!-- ============================================= -->
<!-- 第一节：链接基础 -->
<!-- ============================================= -->

<h1>链接基础</h1>

<!--
    【链接标签 a】
    <a href="地址">文字</a>

    href：链接地址（必须）
    target：打开方式
        _blank：新窗口打开
        _self：当前窗口打开（默认）
-->

<!-- 基本链接 -->
<p><a href="https://www.baidu.com">百度一下</a></p>

<!-- 新窗口打开 -->
<p><a href="https://www.google.com" target="_blank">Google（新窗口）</a></p>

<!-- ============================================= -->
<!-- 第二节：链接类型 -->
<!-- ============================================= -->

<h1>链接类型</h1>

<!-- 网页链接 -->
<p><a href="https://www.baidu.com">网页链接</a></p>

<!-- 锚点链接（页面内跳转） -->
<p><a href="#section2">跳转到第二节</a></p>

<!-- 邮件链接 -->
<p><a href="mailto:test@example.com">发送邮件</a></p>

<!-- 电话链接 -->
<p><a href="tel:13800138000">拨打电话</a></p>

<!-- 下载链接 -->
<p><a href="file.pdf" download>下载文件</a></p>

<!-- ============================================= -->
<!-- 第三节：图片基础 -->
<!-- ============================================= -->

<h1>图片基础</h1>

<!--
    【图片标签 img】
    <img src="地址" alt="描述">

    src：图片地址（必须）
    alt：图片无法显示时的替代文字（必须）
    width：宽度
    height：高度
-->

<!-- 基本图片 -->
<img src="https://via.placeholder.com/200x150" alt="示例图片" width="200" height="150">

<!-- 只设置宽度（高度自适应） -->
<img src="https://via.placeholder.com/300x200" alt="示例图片" width="300">

<!-- ============================================= -->
<!-- 第四节：图片路径 -->
<!-- ============================================= -->

<h1>图片路径</h1>

<!--
    【相对路径】
    同一目录：./image.jpg 或 image.jpg
    上级目录：../image.jpg
    子目录：images/image.jpg

    【绝对路径】
    完整URL：https://example.com/image.jpg
-->

<!-- 相对路径示例 -->
<!-- <img src="./images/photo.jpg" alt="照片"> -->
<!-- <img src="../images/photo.jpg" alt="照片"> -->

<!-- 绝对路径示例 -->
<img src="https://via.placeholder.com/100" alt="网络图片">

<!-- ============================================= -->
<!-- 第五节：图片链接 -->
<!-- ============================================= -->

<h1>图片链接</h1>

<!-- 图片作为链接 -->
<a href="https://www.baidu.com">
    <img src="https://via.placeholder.com/100x50?text=Click" alt="点击跳转">
</a>

<!-- ============================================= -->
<!-- 第六节：图片映射 -->
<!-- ============================================= -->

<h1>图片映射</h1>

<!--
    【图片映射】
    一张图片的不同区域可以点击不同链接
-->

<img src="https://via.placeholder.com/300x200" alt="示例" usemap="#examplemap">

<map name="examplemap">
    <area shape="rect" coords="0,0,150,100" href="https://www.baidu.com" alt="百度">
    <area shape="rect" coords="150,0,300,100" href="https://www.google.com" alt="Google">
    <area shape="circle" coords="150,150,50" href="https://www.bing.com" alt="Bing">
</map>

<!-- ============================================= -->
<!-- 练习题 -->
<!-- ============================================= -->

<h1>练习题</h1>

<h2 id="section2">第二节内容（锚点跳转目标）</h2>
<p>这是通过锚点链接跳转过来的内容。</p>

<h2>练习1：导航栏</h2>
<nav>
    <a href="https://www.baidu.com" target="_blank">百度</a> |
    <a href="https://www.google.com" target="_blank">Google</a> |
    <a href="https://www.bing.com" target="_blank">Bing</a>
</nav>

<h2>练习2：图片画廊</h2>
<div>
    <img src="https://via.placeholder.com/150?text=1" alt="图片1" style="margin: 5px;">
    <img src="https://via.placeholder.com/150?text=2" alt="图片2" style="margin: 5px;">
    <img src="https://via.placeholder.com/150?text=3" alt="图片3" style="margin: 5px;">
</div>

<!-- ============================================= -->
<!-- 课程总结 -->
<!-- ============================================= -->
<!--
核心收获：
- <a href="地址">文字</a> 创建链接，target="_blank" 新窗口打开
- <img src="地址" alt="描述"> 插入图片，alt 属性必须写
- 相对路径（./images/photo.jpg）和绝对路径（https://...）的区别

常见陷阱：
- img 标签忘记写 alt 属性（影响可访问性和 SEO）
- 相对路径搞混 ./ 和 ../ 的层级关系
- 链接的 href 写成 "#" 但没有实际地址

下节课预告：
- 学习有序列表、无序列表和自定义列表
-->

<!-- ============================================= -->
<!-- 恭喜完成 -->
<!-- ============================================= -->
<p style="color: green; font-weight: bold;">
  恭喜你完成了第 03 课：链接与图片！<br>
  下节课我们将学习有序列表、无序列表和自定义列表。
</p>

</body>
</html>
