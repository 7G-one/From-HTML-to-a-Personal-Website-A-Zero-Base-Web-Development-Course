<!DOCTYPE html>
<!-- ============================================= -->
<!-- 第 05 课：表格 -->
<!-- ============================================= -->
<!-- 上节课我们学习了列表。这节课我们学习表格。 -->

<!-- ============================================= -->
<!-- 生活类比 -->
<!-- ============================================= -->
<!-- 表格就像课程表，行和列交叉定位信息。 -->
<!-- tr 是表格的一行，th 是表头（列标题），td 是具体的数据格子。 -->
<!-- colspan 就像合并相邻的格子，rowspan 就像上下打通两个格子。 -->
<!-- thead/tbody/tfoot 就像表格的"头、身体、尾巴"，让结构更清晰。 -->

<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>表格</title>
    <style>
        table {
            border-collapse: collapse;
            width: 100%;
            margin: 20px 0;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }
        th {
            background-color: #4CAF50;
            color: white;
        }
        tr:nth-child(even) {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>

<!-- ============================================= -->
<!-- 第一节：基础表格 -->
<!-- ============================================= -->

<h1>基础表格</h1>

<!--
    【表格结构】
    <table>：表格
    <tr>：行（table row）
    <th>：表头（table header）
    <td>：单元格（table data）
-->

<table>
    <tr>
        <th>姓名</th>
        <th>年龄</th>
        <th>城市</th>
    </tr>
    <tr>
        <td>小明</td>
        <td>18</td>
        <td>北京</td>
    </tr>
    <tr>
        <td>小红</td>
        <td>20</td>
        <td>上海</td>
    </tr>
    <tr>
        <td>小刚</td>
        <td>22</td>
        <td>广州</td>
    </tr>
</table>

<!-- ============================================= -->
<!-- 第二节：表格合并 -->
<!-- ============================================= -->

<h1>表格合并</h1>

<!--
    【合并单元格】
    colspan：跨列合并
    rowspan：跨行合并
-->

<table>
    <tr>
        <th colspan="3">学生信息表</th>
    </tr>
    <tr>
        <th>姓名</th>
        <th>年龄</th>
        <th>城市</th>
    </tr>
    <tr>
        <td>小明</td>
        <td>18</td>
        <td>北京</td>
    </tr>
    <tr>
        <td rowspan="2">小红</td>
        <td>20</td>
        <td>上海</td>
    </tr>
    <tr>
        <td>21</td>
        <td>深圳</td>
    </tr>
</table>

<!-- ============================================= -->
<!-- 第三节：表格分区 -->
<!-- ============================================= -->

<h1>表格分区</h1>

<!--
    【表格分区】
    <thead>：表头
    <tbody>：表体
    <tfoot>：表尾
-->

<table>
    <thead>
        <tr>
            <th>商品</th>
            <th>单价</th>
            <th>数量</th>
            <th>小计</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td>苹果</td>
            <td>¥5</td>
            <td>3</td>
            <td>¥15</td>
        </tr>
        <tr>
            <td>牛奶</td>
            <td>¥12</td>
            <td>2</td>
            <td>¥24</td>
        </tr>
    </tbody>
    <tfoot>
        <tr>
            <td colspan="3">总计</td>
            <td>¥39</td>
        </tr>
    </tfoot>
</table>

<!-- ============================================= -->
<!-- 练习题 -->
<!-- ============================================= -->

<h1>练习题</h1>

<h2>练习1：成绩表</h2>
<table>
    <thead>
        <tr>
            <th>姓名</th>
            <th>语文</th>
            <th>数学</th>
            <th>英语</th>
            <th>总分</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td>小明</td>
            <td>85</td>
            <td>92</td>
            <td>78</td>
            <td>255</td>
        </tr>
        <tr>
            <td>小红</td>
            <td>90</td>
            <td>88</td>
            <td>95</td>
            <td>273</td>
        </tr>
    </tbody>
</table>

<h2>练习2：课程表</h2>
<table>
    <tr>
        <th>时间</th>
        <th>周一</th>
        <th>周二</th>
        <th>周三</th>
    </tr>
    <tr>
        <td>上午</td>
        <td>数学</td>
        <td>语文</td>
        <td>英语</td>
    </tr>
    <tr>
        <td>下午</td>
        <td>体育</td>
        <td>音乐</td>
        <td>美术</td>
    </tr>
</table>

<!-- ============================================= -->
<!-- 课程总结 -->
<!-- ============================================= -->
<!--
核心收获：
- table/tr/th/td 构成表格基本结构
- colspan 跨列合并，rowspan 跨行合并
- thead/tbody/tfoot 语义化分区，便于样式控制

常见陷阱：
- 忘记在 tr 内写 td/th（td/th 必须在 tr 内）
- 合并单元格后忘记删除被合并的 td
- 用表格来做网页布局（表格只用于展示数据，布局用 CSS）

下节课预告：
- 学习表单，收集用户输入数据
-->

<!-- ============================================= -->
<!-- 恭喜完成 -->
<!-- ============================================= -->
<p style="color: green; font-weight: bold;">
  恭喜你完成了第 05 课：表格！<br>
  下节课我们将学习表单。
</p>

</body>
</html>
