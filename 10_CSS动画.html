<!DOCTYPE html>
<!-- ============================================= -->
<!-- 第 10 课：CSS 动画 -->
<!-- ============================================= -->
<!-- 上节课我们学习了 CSS 布局。这节课我们学习 CSS 动画。 -->

<!-- ============================================= -->
<!-- 生活类比 -->
<!-- ============================================= -->
<!-- transition 像开门——推开的过程是平滑的，不会突然"啪"地打开。 -->
<!-- animation 像跳舞——有节奏、有重复、有规律地动起来。 -->
<!-- @keyframes 就像舞蹈编排，规定每个时间点的动作姿势。 -->
<!-- animation-iteration-count: infinite 就像单曲循环，一直重复播放。 -->

<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>CSS 动画</title>
    <style>
        body { font-family: "微软雅黑", sans-serif; padding: 20px; }
        h2 { color: #333; border-bottom: 2px solid #4CAF50; padding-bottom: 5px; }
        .demo { background-color: #f5f5f5; padding: 20px; margin: 10px 0; border-radius: 5px; }
        .exercise { background-color: #f9f9f9; border: 1px solid #ddd; padding: 15px; margin: 10px 0; }
    </style>
</head>
<body>

<!-- ============================================= -->
<!-- 第一节：过渡（Transition） -->
<!-- ============================================= -->

<h1>过渡（Transition）</h1>

<!--
    【过渡属性】
    transition-property：要过渡的属性
    transition-duration：过渡时间
    transition-timing-function：速度曲线
    transition-delay：延迟时间

    简写：transition: property duration timing-function delay;
-->

<h2>颜色过渡</h2>
<style>
    .transition-box {
        background-color: #4CAF50;
        color: white;
        padding: 20px;
        text-align: center;
        transition: background-color 0.5s ease;
        cursor: pointer;
    }
    .transition-box:hover {
        background-color: #2196F3;
    }
</style>
<div class="demo">
    <div class="transition-box">鼠标悬停（颜色过渡）</div>
</div>

<h2>大小过渡</h2>
<style>
    .scale-box {
        background-color: #FF9800;
        color: white;
        padding: 20px;
        text-align: center;
        transition: transform 0.3s ease;
        cursor: pointer;
    }
    .scale-box:hover {
        transform: scale(1.1);
    }
</style>
<div class="demo">
    <div class="scale-box">鼠标悬停（放大）</div>
</div>

<!-- ============================================= -->
<!-- 第二节：动画（Animation） -->
<!-- ============================================= -->

<h1>动画（Animation）</h1>

<!--
    【动画属性】
    @keyframes：定义动画
    animation-name：动画名称
    animation-duration：持续时间
    animation-timing-function：速度曲线
    animation-delay：延迟
    animation-iteration-count：重复次数
    animation-direction：方向
    animation-fill-mode：填充模式

    简写：animation: name duration timing-function delay iteration-count direction;
-->

<h2>简单动画</h2>
<style>
    @keyframes slideIn {
        from { transform: translateX(-100%); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
    }

    .slide-in {
        background-color: #9C27B0;
        color: white;
        padding: 20px;
        text-align: center;
        animation: slideIn 1s ease-out;
    }
</style>
<div class="demo">
    <div class="slide-in">滑入动画</div>
</div>

<h2>无限循环动画</h2>
<style>
    @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.1); }
        100% { transform: scale(1); }
    }

    .pulse {
        background-color: #E91E63;
        color: white;
        padding: 20px;
        text-align: center;
        animation: pulse 2s infinite;
    }
</style>
<div class="demo">
    <div class="pulse">脉冲动画（无限循环）</div>
</div>

<h2>旋转动画</h2>
<style>
    @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }

    .spin {
        width: 50px;
        height: 50px;
        background-color: #00BCD4;
        animation: spin 2s linear infinite;
    }
</style>
<div class="demo">
    <div class="spin"></div>
</div>

<!-- ============================================= -->
<!-- 第三节：动画属性详解 -->
<!-- ============================================= -->

<h1>动画属性详解</h1>

<h2>速度曲线</h2>
<style>
    .speed-demo {
        width: 30px;
        height: 30px;
        background-color: #4CAF50;
        margin: 10px 0;
    }

    @keyframes moveRight {
        from { transform: translateX(0); }
        to { transform: translateX(400px); }
    }

    .linear { animation: moveRight 2s linear infinite; }
    .ease { animation: moveRight 2s ease infinite; }
    .ease-in { animation: moveRight 2s ease-in infinite; }
    .ease-out { animation: moveRight 2s ease-out infinite; }
    .ease-in-out { animation: moveRight 2s ease-in-out infinite; }
</style>
<div class="demo">
    <p>linear:</p>
    <div class="speed-demo linear"></div>
    <p>ease:</p>
    <div class="speed-demo ease"></div>
    <p>ease-in:</p>
    <div class="speed-demo ease-in"></div>
</div>

<!-- ============================================= -->
<!-- 练习题 -->
<!-- ============================================= -->

<h1>练习题</h1>

<div class="exercise">
    <h2>练习1：按钮动画</h2>
    <style>
        .animated-btn {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .animated-btn:hover {
            background-color: #45a049;
            transform: translateY(-3px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
    </style>
    <button class="animated-btn">悬停试试</button>
</div>

<div class="exercise">
    <h2>练习2：加载动画</h2>
    <style>
        @keyframes loading {
            0% { width: 0; }
            100% { width: 100%; }
        }
        .loading-bar {
            height: 5px;
            background-color: #4CAF50;
            animation: loading 2s ease-in-out infinite;
        }
    </style>
    <div style="background-color: #eee; border-radius: 5px; overflow: hidden;">
        <div class="loading-bar"></div>
    </div>
</div>

<div class="exercise">
    <h2>练习3：淡入动画</h2>
    <style>
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .fade-in {
            background-color: #2196F3;
            color: white;
            padding: 20px;
            text-align: center;
            animation: fadeIn 2s ease-in;
        }
    </style>
    <div class="fade-in">淡入效果</div>
</div>

<!-- ============================================= -->
<!-- 课程总结 -->
<!-- ============================================= -->
<!--
核心收获：
- transition 实现属性变化的平滑过渡（hover 效果必备）
- @keyframes 定义动画关键帧，animation 控制播放
- animation-iteration-count: infinite 让动画无限循环

常见陷阱：
- transition 忘记指定属性名（默认 all 可能影响不需要的属性）
- @keyframes 里 from/to 的属性不一致导致动画跳帧
- 动画性能：优先用 transform 和 opacity（不会触发重排）

下节课预告：
- 进入 JavaScript 的世界，让网页具备交互能力
-->

</html>
